<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick It</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <img src="assets/logo.svg" alt="">
    </nav>
    <main>
        <div class="loading-screen" id="loadingScreen">
            <div class="typewriter">
                <h1>Sticky Notes Loading</h1>
            </div>
        </div>
        <div id="aboutGrid">
            <div id="about">    
                <h2>About</h2>
                <h2>+</h2>
            </div>
            <p id="aboutText"></p>
        </div>
        
        <div class="choices">
            <div id="Paste">
                <h2>Note Contribution</h2>
            </div>
            <div id="choicesInput">
                <div class="input">
                <input type="date" id="date">
                <br>
                <br>
                <textarea id="message" class="textArea" name="message" rows="8" cols="39" placeholder="Paste your note here..." maxlength="100"></textarea>
                <p class="word-count">Word Count: <span id="wordCount">0</span>/20</p>
                <br>
                    <button id="submitBtn">Log</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <p id="controlT">Controls?</p>
        </div>
        <div class="canvas">
            <div class="content" id="content">
            </div>
        </div>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
